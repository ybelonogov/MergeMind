project_name: MergeMind
paths:
  raw:
    codereviewer: sample_data/raw/codereviewer.jsonl
    codereviewqa: sample_data/raw/codereviewqa.jsonl
    codocbench: sample_data/raw/codocbench.jsonl
  prepared_dir: artifacts/data
  model_dir: artifacts/models
  evaluation_dir: artifacts/evaluation
pipeline:
  - datasets
  - context_processing
  - models
  - validation
datasets:
  primary: CodeReviewer
  validation_aux:
    - CodeReviewQA
    - CoDocBench
model:
  retrieval_top_examples: 4
  max_candidates: 5
  reranker:
    retrieval_weight: 0.65
    identifier_weight: 0.2
    file_weight: 0.1
    action_weight: 0.08
    hedge_penalty: 0.08
    verbosity_penalty: 0.05
    short_penalty: 0.04
validation:
  use_llm_judge: false
  use_tests_ci: true
  similarity_threshold: 0.35
  top_n: 3
demo:
  top_n: 3
