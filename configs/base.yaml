project_name: MergeMind
paths:
  download_dir: data/downloads
  raw_manifest: data/raw/download_manifest.json
  raw:
    codereviewer: data/raw/codereviewer
    codereviewqa: data/raw/codereviewqa/CodeReviewQA.jsonl
    codocbench: data/raw/codocbench
  prepared_dir: artifacts/data
  model_dir: artifacts/models
  evaluation_dir: artifacts/evaluation
pipeline:
  - datasets
  - context_processing
  - models
  - validation
download:
  codereviewer_comment_generation_url: https://zenodo.org/records/6900648/files/Comment_Generation.zip?download=1
  codereviewqa_url: https://huggingface.co/datasets/Tomo-Melb/CodeReviewQA/resolve/main/CodeReviewQA.jsonl
  codocbench_base_url: https://raw.githubusercontent.com/kunpai/codocbench/main/dataset
datasets:
  primary: CodeReviewer
  validation_aux:
    - CodeReviewQA
    - CoDocBench
prepare:
  train_limit: 12000
  validation_limit: 1500
  test_limit: 1500
  max_patch_chars: 6000
  max_context_chars: 4000
  max_repository_file_chars: 12000
model:
  retrieval_top_examples: 6
  max_candidates: 8
  max_train_examples: 12000
  vectorizer_max_features: 50000
  vectorizer_min_df: 2
  reranker:
    mode: logistic
    training_examples: 2500
    negative_candidates_per_example: 3
    retrieval_weight: 0.65
    identifier_weight: 0.2
    file_weight: 0.1
    action_weight: 0.08
    hedge_penalty: 0.08
    verbosity_penalty: 0.05
    short_penalty: 0.04
validation:
  use_llm_judge: false
  use_tests_ci: true
  similarity_threshold: 0.35
  top_n: 3
  llm_judge_model: ""
  llm_judge_max_examples: 25
demo:
  top_n: 3
